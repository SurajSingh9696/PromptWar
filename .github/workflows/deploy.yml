name: Test and Deploy Cloud Run

on:
  push:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r functions/requirements.txt -r requirements-test.txt

      - name: Run tests
        env:
          PYTHONPATH: .
        run: pytest tests/

  deploy:
    runs-on: ubuntu-latest
    needs: test
    if: ${{ secrets.GCP_PROJECT_ID != '' && secrets.GCP_SA_KEY != '' && secrets.GEMINI_API_KEY != '' }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_SA_KEY }}

      - name: Set up gcloud
        uses: google-github-actions/setup-gcloud@v2

      - name: Deploy to Cloud Run
        run: |
          gcloud run deploy votewise-india \
            --project ${{ secrets.GCP_PROJECT_ID }} \
            --region asia-south1 \
            --source . \
            --allow-unauthenticated \
            --set-env-vars GEMINI_API_KEY=${{ secrets.GEMINI_API_KEY }},ACTIVE_MODEL=gemini-2.5-flash
